# Navigate panes with Ctrl+hjkl (matches nvim split navigation)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Enable mouse support (resize panes, click to focus, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Show pane labels in border using a user-defined option (@label)
# Programs cannot override this since it's not tied to the pane title
set -g pane-border-status top
set -g pane-border-format ' #{@label} '

# Prevent programs from renaming window titles via escape sequences
set -g allow-rename off
setw -g automatic-rename off

# Increase scrollback buffer
set -g history-limit 10000

# Don't wait for escape sequences (faster response in nvim)
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
