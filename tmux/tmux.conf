# Use C-a as the prefix (C-a C-a sends a literal C-a to the shell)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Seamless Ctrl+hjkl navigation across nvim splits AND tmux panes, provided by
# the vim-tmux-navigator plugin (below). It checks whether the focused pane is
# running nvim: if so it forwards the keystroke to nvim, otherwise it switches
# tmux panes. C-l is now navigation, so restore clear-screen on prefix + C-l:
bind C-l send-keys 'C-l'

# Enable mouse support (resize panes, click to focus, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Show pane titles in border
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '

# Increase scrollback buffer
set -g history-limit 10000

# Don't wait for escape sequences (faster response in nvim)
set -sg escape-time 10

# Enable focus events so nvim can detect pane switches
set -g focus-events on

# Use vi keys in copy mode (consistent with nvim)
set -g mode-keys vi

# Clipboard integration (cross-platform)
set -g set-clipboard on
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell "command -v wl-copy" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "wl-copy"
    bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "wl-copy"
  } {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  }
}

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Swap window left/right
bind -r S-Left swap-window -t -1\; select-window -t -1
bind -r S-Right swap-window -t +1\; select-window -t +1

# New named session (mirrors `prefix c` for new window)
bind C-c command-prompt -p "New session:" "new-session -s '%%'"

# Clone current window's pane layout into a new window
bind C run-shell 'tmux-clone-layout'

# Clone current window (layout, directories, commands) into a new window
bind M-c run-shell 'tmux-clone-window'

# Open the pkm vault in a new window (mirrors <leader>oP in nvim). The vault path
# differs per machine: OneDrive on WSL, ~/pkm on macOS.
if-shell "uname | grep -q Darwin" {
  bind P new-window -n pkm "cd ~/pkm && exec nvim ."
} {
  bind P new-window -n pkm 'cd "/mnt/c/Users/patrick.fitzgerald/OneDrive - Juvare/Documents/juvare-pkm" && exec nvim .'
}

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# Re-launch these processes with their full command line on restore.
# nvim/node/claude aren't in the default whitelist with args, so without this
# they come back as bare `nvim`/etc. (or not at all for claude).
set -g @resurrect-processes '"~nvim *" "~claude *" "~node *" ssh'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
