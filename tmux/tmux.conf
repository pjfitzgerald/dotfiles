# Use C-Space as the prefix — keeps terminal-default C-a (beginning-of-line)
# free. C-Space C-Space sends a literal C-Space through, which is how to reach
# blink.cmp's <C-space> (open completion menu / toggle docs) in nvim.
set -g prefix C-Space
unbind C-b
unbind C-a
bind C-Space send-prefix

# Seamless Ctrl+hjkl navigation across nvim splits AND tmux panes, provided by
# the vim-tmux-navigator plugin (below). It checks whether the focused pane is
# running nvim: if so it forwards the keystroke to nvim, otherwise it switches
# tmux panes. C-l is now navigation, so restore clear-screen on prefix + C-l:
bind C-l send-keys 'C-l'

# Reload this config into the running session. Note: sourcing is additive, not a
# reset — bindings/hooks deleted from this file stay live until the server is
# restarted. Uses R, not the conventional r, to leave prefix + r (the tmux
# default refresh-client) alone.
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Enable mouse support (resize panes, click to focus, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber remaining windows when one closes (no gaps in M-1..9 jumps)
set -g renumber-windows on

# Show pane titles in border
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '

# Pane border colours: active pane stays green, inactive borders are orange so
# panes are easier to tell apart. colour208 (#ff8700) is a bright orange that
# reads well against the tokyonight background.
set -g pane-border-style 'fg=colour208'
set -g pane-active-border-style 'fg=green'
# Heavier box-drawing characters for a thicker-looking border (tmux 3.2+).
set -g pane-border-lines heavy

# Status bar: orange background (colour208, matching the pane borders) with black
# text, instead of the tmux default green.
# set -g status-style 'bg=colour208,fg=black'

# Increase scrollback buffer
set -g history-limit 50000

# Don't wait for escape sequences (faster response in nvim)
set -sg escape-time 10

# Enable focus events so nvim can detect pane switches
set -g focus-events on

# Use vi keys in copy mode (consistent with nvim)
set -g mode-keys vi

# Clipboard integration (cross-platform)
set -g set-clipboard on
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell "command -v wl-copy" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "wl-copy"
    bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "wl-copy"
  } {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  }
}

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Swap window left/right
bind -r S-Left swap-window -t -1\; select-window -t -1
bind -r S-Right swap-window -t +1\; select-window -t +1

# New named session (mirrors `prefix c` for new window)
bind C-c command-prompt -p "New session:" "new-session -s '%%'"

# Clone current window's pane layout into a new window
bind C run-shell 'tmux-clone-layout'

# Clone current window (layout, directories, commands) into a new window
bind M-c run-shell 'tmux-clone-window'

# Send the current pane into another window (side-by-side). Prompts for the
# target: a bare name/index targets a window in this session; 'session:window'
# targets a window in another session.
bind J command-prompt -p "Send pane to [session:]window:" "if-shell 'case \"%%\" in *:*) true;; *) false;; esac' 'join-pane -h -t \"%%\"' 'join-pane -h -t \":%%\"'"

# Break the current pane out into its own new window (inverse of the merge above)
bind b break-pane

# Open the pkm vault (mirrors <leader>oP in nvim). If a 'pkm' window already
# exists in the current session, switch to it instead of opening another;
# otherwise create it. `select-window -t '=pkm'` matches the window name exactly
# in the current session and selects it (succeeds), so on failure (no such
# window) the `||` branch creates it. Vault path differs per machine: OneDrive
# on WSL (detected by the mount existing), ~/pkm on macOS and Linux.
if-shell "test -d '/mnt/c/Users/patrick.fitzgerald/OneDrive - Juvare/Documents/juvare-pkm'" {
  bind P run-shell "tmux select-window -t '=pkm' 2>/dev/null || tmux new-window -n pkm -c '/mnt/c/Users/patrick.fitzgerald/OneDrive - Juvare/Documents/juvare-pkm' nvim '/mnt/c/Users/patrick.fitzgerald/OneDrive - Juvare/Documents/juvare-pkm'"
} {
  bind P run-shell "tmux select-window -t '=pkm' 2>/dev/null || tmux new-window -n pkm -c ~/pkm nvim ~/pkm"
}

# --- Prefix-free Alt bindings (ported from Omarchy / DHH) ---

# Split down / split right, inheriting the current pane's directory
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"

# Kill the current pane
bind -n M-Escape kill-pane

# Jump straight to window N
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Jump straight to pane N with Alt-Shift-N. The terminal sends the *shifted
# symbol* (Alt-Shift-1 arrives as M-!), so these are layout-dependent (US/AU).
# `.N` = pane N of the current window; pane numbers are what prefix-q shows.
bind -n 'M-!' select-pane -t .1
bind -n 'M-@' select-pane -t .2
bind -n 'M-#' select-pane -t .3
bind -n 'M-$' select-pane -t .4
bind -n 'M-%' select-pane -t .5
bind -n 'M-^' select-pane -t .6
bind -n 'M-&' select-pane -t .7
bind -n 'M-*' select-pane -t .8
bind -n 'M-(' select-pane -t .9

# Previous/next session
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Most-recent pane/window/session — same keys as the prefix versions (;/l/L),
# just Alt instead of prefix.
bind -n 'M-;' last-pane
bind -n M-l last-window
bind -n M-L switch-client -l

# Extended key reporting (csi-u), needed for the terminal to distinguish
# M-S-Enter from M-Enter; also gives TUIs like Claude Code a real Shift+Enter.
# Requires a csi-u/kitty-protocol terminal (kitty, alacritty, ghostty, wezterm);
# harmless where unsupported — M-S-Enter just arrives as M-Enter there.
set -g extended-keys on
set -g extended-keys-format csi-u

# Auto-name windows after the current directory's basename. A manual rename
# (prefix , or new-window -n, e.g. the pkm window) turns automatic-rename off
# for that window, so named windows keep their names.
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# Re-launch these processes with their full command line on restore.
# nvim/node/claude aren't in the default whitelist with args, so without this
# they come back as bare `nvim`/etc. (or not at all for claude).
set -g @resurrect-processes '"~nvim *" "~claude *" "~node *" ssh'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Switch to another active session upon destroying a session
# (killing the last window for instance) instead of detaching
set -g detach-on-destroy off

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
